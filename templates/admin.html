<!DOCTYPE html>
<html>
    <title>Admin Panel - hyperstore.ke</title>
</head>
<body>
<h1>Admin Panel</h1>

<h2>Add Product</h2>

<form method="POST" action="/add_product">
    <input name="name" placeholder="Product Name" required><br><br>
    <input name="price" placeholder="Price" required><br><br>
    <textarea name="description" placeholder="Description" required></textarea><br><br>
    <button type="submit">Add Product</button>
</form>

<hr>

<h2>Existing Products</h2>

<ul>
{% for p in products %}
    <li>
        <b>{{ p.name }}</b> - KES {{ p.price }} <br>
        {{ p.description }} <br><br>

        <a href="/edit_product/{{ p.id }}">Edit</a> |
        <a href="/delete_product/{{ p.id }}" onclick="return confirm('Delete this product?')">Delete</a>
        <hr>
    </li>
{% endfor %}
</ul>

</body>
</html>
